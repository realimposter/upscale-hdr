build:
  gpu: true
  system_packages:
    - "libgl1-mesa-glx"
    - "libglib2.0-0"
    - "ffmpeg"
  python_version: "3.10"
  python_packages:
    - "torch==2.3.0"
    - "torchvision==0.18.0"
    - "realesrgan==0.3.0"
    - "basicsr==1.4.2"
    - "opencv-python-headless==4.9.0.80"
    - "numpy==1.26.4"
    - "Pillow==10.2.0"
  run:
    - "python -c \"import os, basicsr; f=os.path.join(os.path.dirname(basicsr.__file__), 'data/degradations.py'); s=open(f).read().replace('from torchvision.transforms.functional_tensor ', 'from torchvision.transforms.functional '); open(f, 'w').write(s)\" || true"
    - "mkdir -p weights"
    - "wget https://github.com/xinntao/Real-ESRGAN/releases/download/v0.1.0/RealESRGAN_x4plus.pth -O weights/RealESRGAN_x4plus.pth"
predict: "predict.py:Predictor"
