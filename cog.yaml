build:
  gpu: true
  system_packages:
    - "libgl1-mesa-glx"
    - "libglib2.0-0"
    - "ffmpeg"
  python_version: "3.10"
  python_packages:
    - "torch==2.3.0"
    - "torchvision==0.18.0"
    - "opencv-python-headless==4.9.0.80"
    - "numpy==1.26.4"
    - "Pillow==10.2.0"
    - "addict==2.4.0"
    - "future==1.0.0"
    - "pyyaml==6.0.1"
    - "requests==2.31.0"
    - "scipy==1.13.0"
    - "tqdm==4.66.2"
  run:
    - "pip install --no-deps basicsr==1.4.2 realesrgan==0.3.0"
    - "python -c \"import site, os; [open(f, 'w').write(open(f).read().replace('from torchvision.transforms.functional_tensor ', 'from torchvision.transforms.functional ')) for p in site.getsitepackages() for f in [os.path.join(p, 'basicsr/data/degradations.py')] if os.path.exists(f)]\""
    - "mkdir -p weights"
    - "wget https://github.com/xinntao/Real-ESRGAN/releases/download/v0.1.0/RealESRGAN_x4plus.pth -O weights/RealESRGAN_x4plus.pth"
predict: "predict.py:Predictor"
