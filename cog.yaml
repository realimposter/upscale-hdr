build:
  gpu: true
  system_packages:
    - "libgl1-mesa-glx"
    - "libglib2.0-0"
    - "ffmpeg"
    - "wget"
  python_version: "3.10"
  python_packages:
    - "torch==2.0.1"
    - "torchvision==0.15.2"
    - "realesrgan==0.3.0"
    - "basicsr==1.4.2"
    - "facexlib==0.3.0"
    - "gfpgan==1.3.8"
    - "opencv-python-headless==4.9.0.80"
    - "numpy==1.26.4"
    - "Pillow==10.2.0"
  run:
    - "mkdir -p weights"
    - "wget https://github.com/xinntao/Real-ESRGAN/releases/download/v0.1.0/RealESRGAN_x4plus.pth -O weights/RealESRGAN_x4plus.pth"
    - "wget https://github.com/xinntao/Real-ESRGAN/releases/download/v0.2.2.4/RealESRGAN_x4plus_anime_6B.pth -O weights/RealESRGAN_x4plus_anime_6B.pth"
    - "wget https://github.com/TencentARC/GFPGAN/releases/download/v1.3.0/GFPGANv1.3.pth -O weights/GFPGANv1.3.pth"
predict: "predict.py:Predictor"
